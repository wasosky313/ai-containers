services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - llama-models:/root/.cache
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    command: >
      -hf ${LLAMA_MODEL:-Qwen/Qwen2.5-7B-Instruct-GGUF:Q4_K_M}
      --host 0.0.0.0
      --port 8080
      -ngl 99

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://llama-server:8080/v1
      - OPENAI_API_KEY=none
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      - llama-server

volumes:
  llama-models:
  open-webui:
